name: Build Docker images

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: go-dev
            file: dockerfiles/go.dockerfile
            context: .
          - name: php7-dev
            file: dockerfiles/php-7.dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR from GitHub runner
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ github.sha }}