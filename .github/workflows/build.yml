name: Build Docker images

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: go-dev
            file: dockerfiles/go.dockerfile
            context: .
          - name: php7-dev
            file: dockerfiles/php-7.dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set lowercase image owner
        run: |
          echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR from GitHub runner
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Primary path: push multi-arch image to GHCR.
      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image.name }}:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  build-artifacts:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: go-dev
            file: dockerfiles/go.dockerfile
            context: .
          - name: php7-dev
            file: dockerfiles/php-7.dockerfile
            context: .
        platform:
          - os: linux
            arch: amd64
            suffix: linux-amd64
          - os: linux
            arch: arm64
            suffix: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set lowercase image owner
        run: |
          echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Fallback path: export image as tar, no registry pull needed.
      - name: Build Docker tar artifact ${{ matrix.image.name }} ${{ matrix.platform.suffix }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: false
          platforms: ${{ matrix.platform.os }}/${{ matrix.platform.arch }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image.name }}:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image.name }}:${{ github.sha }}
          outputs: type=docker,dest=/tmp/${{ matrix.image.name }}-${{ matrix.platform.suffix }}.tar
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.suffix }}

      - name: Upload Docker tar artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image.name }}-${{ matrix.platform.suffix }}
          path: /tmp/${{ matrix.image.name }}-${{ matrix.platform.suffix }}.tar
          retention-days: 7